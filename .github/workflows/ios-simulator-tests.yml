name: iOS Simulator Robot Framework Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  ios-simulator-tests:
    timeout-minutes: 45
    runs-on: macos-latest
    env:
      SIMULATOR_NAME: "iPhone 15"
      PLATFORM_VERSION: "17.0"
      SIMULATOR_TIMEOUT: 350

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Setup Node.js for Appium
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          echo "Python dependencies installed successfully"

      - name: Install Appium
        run: |
          npm install -g appium@latest
          appium --version
          echo "Appium installed successfully"

      - name: Install Appium XCUITest Driver
        run: |
          appium driver install xcuitest
          appium driver list --installed
          echo "Appium XCUITest driver installed"

      - name: Install Required Dependencies
        run: |
          # Install Carthage for iOS dependencies
          brew install carthage
          
          # Install applesimutils for simulator control
          brew tap wix/brew
          brew install applesimutils
          
          echo "iOS dependencies installed successfully"

      - name: List Available Simulators
        run: |
          xcrun simctl list devices
          echo "Available simulators listed"

      - name: Shutdown All Simulators
        run: |
          xcrun simctl shutdown all || true
          echo "All simulators shut down"

      - name: Get/Create Simulator UDID
        id: get-udid
        run: |
          set -euo pipefail

          echo "Xcode version:"
          xcodebuild -version

          echo "Available runtimes:"
          xcrun simctl list runtimes

          # Pick an available iOS runtime (prefer the requested major/minor if present)
          RUNTIME_ID=$(xcrun simctl list runtimes |
            awk -v ver="${PLATFORM_VERSION}" '
              $0 ~ /iOS/ && $0 ~ ver { print $NF }
            ' | tr -d '()' | head -n 1)

          # Fallback to the latest available iOS runtime if exact version not found
          if [ -z "${RUNTIME_ID:-}" ]; then
            RUNTIME_ID=$(xcrun simctl list runtimes |
              awk '/iOS/ { print $NF }' | tr -d '()' | tail -n 1)
          fi

          if [ -z "${RUNTIME_ID:-}" ]; then
            echo "Error: No iOS runtimes found on runner."
            exit 1
          fi

          echo "Using runtime: $RUNTIME_ID"

          # Derive iOS platform version from runtime id (e.g. iOS-18-6 -> 18.6)
          IOS_PLATFORM_VERSION=$(echo "$RUNTIME_ID" | sed -E 's/.*iOS-([0-9]+)-([0-9]+).*/\1.\2/')
          if [ -z "${IOS_PLATFORM_VERSION:-}" ] || [ "$IOS_PLATFORM_VERSION" = "$RUNTIME_ID" ]; then
            echo "Error: Could not derive iOS platform version from runtime: $RUNTIME_ID"
            exit 1
          fi
          echo "Selected iOS platform version: $IOS_PLATFORM_VERSION"

          # Try to find an existing simulator by name (any state)
          UDID=$(xcrun simctl list devices available -j | python3 -c "import json, sys; data=json.load(sys.stdin); [print(d['udid']) for rt, devs in data.get('devices', {}).items() for d in devs if d.get('name') == '$SIMULATOR_NAME']" | head -n 1)

          # If not found, create it
          if [ -z "${UDID:-}" ]; then
            echo "Simulator '$SIMULATOR_NAME' not found. Creating..."
            UDID=$(xcrun simctl create "$SIMULATOR_NAME" "com.apple.CoreSimulator.SimDeviceType.$(echo "$SIMULATOR_NAME" | tr " " "-")" "$RUNTIME_ID" || true)
          fi

          # If create via guessed type failed, fall back to a known device type id
          if [ -z "${UDID:-}" ]; then
            DEVICE_TYPE_ID=$(xcrun simctl list devicetypes |
              awk -v name="$SIMULATOR_NAME" '$0 ~ name { print $NF }' | tr -d '()' | head -n 1)

            if [ -z "${DEVICE_TYPE_ID:-}" ]; then
              echo "Error: Could not find device type for '$SIMULATOR_NAME'."
              echo "Available device types:"
              xcrun simctl list devicetypes
              exit 1
            fi

            UDID=$(xcrun simctl create "$SIMULATOR_NAME" "$DEVICE_TYPE_ID" "$RUNTIME_ID")
          fi

          echo "Simulator UDID: $UDID"
          if [ -z "${UDID:-}" ]; then
            echo "Error: UDID still empty after create/find."
            exit 1
          fi

          echo "UDID=$UDID" >> "$GITHUB_ENV"
          echo "IOS_PLATFORM_VERSION=$IOS_PLATFORM_VERSION" >> "$GITHUB_ENV"

      - name: Boot iOS Simulator
        run: |
          if [ -n "$UDID" ]; then
            xcrun simctl boot "$UDID" || echo "Simulator may already be booted"
            echo "Booting simulator with UDID: $UDID"
          else
            echo "Error: Simulator UDID not found!"
            exit 1
          fi

      - name: Wait for Simulator to Boot
        run: |
          echo "Waiting for simulator to boot completely..."
          xcrun simctl bootstatus "$UDID" -b
          sleep 5
          echo "Simulator booted successfully"

      - name: Start Appium Server
        run: |
          set -euo pipefail

          # Ensure the log file exists even if appium fails early
          : > appium-server.log
          : > appium-stdout.log

          # Bind explicitly and write logs to the file
          nohup appium \
            --address 127.0.0.1 \
            --port 4723 \
            --base-path / \
            --log-level debug \
            --log appium-server.log \
            > appium-stdout.log 2>&1 &

          echo $! > appium.pid

          # Wait for the server process, listener log, and HTTP status endpoint
          for i in {1..45}; do
            if ! kill -0 "$(cat appium.pid)" 2>/dev/null; then
              echo "Appium process exited before becoming ready"
              echo "==== appium-server.log ===="
              tail -n 200 appium-server.log || true
              echo "==== appium-stdout.log ===="
              tail -n 200 appium-stdout.log || true
              exit 1
            fi

            if grep -q "Appium REST http interface listener started" appium-server.log && curl -fsS http://127.0.0.1:4723/status >/dev/null; then
              echo "Appium is up"
              exit 0
            fi
            sleep 2
          done

          echo "Appium did not become ready in time"
          echo "==== appium-server.log ===="
          tail -n 200 appium-server.log || true
          echo "==== appium-stdout.log ===="
          tail -n 200 appium-stdout.log || true
          exit 1

      - name: Verify Appium Server is Running
        run: |
          curl -fsS http://127.0.0.1:4723/status
          echo "Appium server is running and responding"

      - name: Prepare iOS Simulator
        run: |
          # Enable UI Automation
          xcrun simctl boot "$UDID" || true

          # Open the Simulator UI so CoreSimulator services are fully initialized
          open -a Simulator || true

          # Clear stale WebDriverAgent build products on ephemeral runners
          rm -rf /tmp/appium-webdriveragent || true
          
          # Disable keyboard autocorrect for stability
          xcrun simctl spawn "$UDID" defaults write -g NSAutomaticCapitalizationEnabled -bool false
          xcrun simctl spawn "$UDID" defaults write -g NSAutomaticSpellingCorrectionEnabled -bool false
          
          # Reset privacy permissions
          xcrun simctl privacy "$UDID" reset all || true
          
          sleep 3
          echo "iOS simulator prepared for testing"

      - name: Install iOS App on Simulator
        run: |
          set -euo pipefail
          APP_PATH="$GITHUB_WORKSPACE/apps/wdioNativeDemoApp.app"

          # Extract the real bundle ID from the app's Info.plist
          BUNDLE_ID=$(/usr/libexec/PlistBuddy -c "Print CFBundleIdentifier" "$APP_PATH/Info.plist")
          echo "Detected bundle ID: $BUNDLE_ID"
          echo "IOS_BUNDLE_ID=$BUNDLE_ID" >> "$GITHUB_ENV"

          # Install on the booted simulator
          xcrun simctl install "$UDID" "$APP_PATH"
          echo "App installed successfully"

          # Verify installation using the real bundle ID
          CONTAINER=$(xcrun simctl get_app_container "$UDID" "$BUNDLE_ID" app 2>&1) && \
            echo "App container verified: $CONTAINER" || \
            echo "WARNING: Could not verify app container for $BUNDLE_ID"

      - name: Run Robot Framework Tests - Smoke Suite
        run: |
          robot --outputdir results \
                --loglevel INFO \
                --include Smoke \
                --name "Smoke Test Suite" \
                --variable PLATFORM_NAME:ios \
                --variable IOS_PLATFORM_VERSION:${IOS_PLATFORM_VERSION} \
                --variable DEVICE_NAME:"iPhone 15" \
                --variable UDID:$UDID \
                --variable IOS_APP_BUNDLE_ID:${IOS_BUNDLE_ID} \
                --variable ENABLE_VIDEO_RECORDING:True \
                test-cases || true

      - name: Run Robot Framework Tests - P0 Critical Tests
        run: |
          robot --outputdir results/p0 \
                --loglevel INFO \
                --include P0 \
                --name "P0 Critical Tests" \
                --variable PLATFORM_NAME:ios \
                --variable IOS_PLATFORM_VERSION:${IOS_PLATFORM_VERSION} \
                --variable DEVICE_NAME:"iPhone 15" \
                --variable UDID:$UDID \
                --variable IOS_APP_BUNDLE_ID:${IOS_BUNDLE_ID} \
                --variable ENABLE_VIDEO_RECORDING:True \
                test-cases || true

      - name: Run Robot Framework Tests - Login Regression
        run: |
          if [ -d test-cases/login ]; then
            robot --outputdir results/login \
                  --loglevel INFO \
                  --name "Login Regression Suite" \
                  --variable PLATFORM_NAME:ios \
                  --variable IOS_PLATFORM_VERSION:${IOS_PLATFORM_VERSION} \
                  --variable DEVICE_NAME:"iPhone 15" \
                  --variable UDID:$UDID \
                  --variable IOS_APP_BUNDLE_ID:${IOS_BUNDLE_ID} \
                  --variable ENABLE_VIDEO_RECORDING:True \
                  test-cases/login || true
          else
            echo "Login test suite directory not found, skipping..."
          fi

      - name: Run Robot Framework Tests - Signup Regression
        run: |
          if [ -d test-cases/signup ]; then
            robot --outputdir results/signup \
                  --loglevel INFO \
                  --name "Signup Regression Suite" \
                  --variable PLATFORM_NAME:ios \
                  --variable IOS_PLATFORM_VERSION:${IOS_PLATFORM_VERSION} \
                  --variable DEVICE_NAME:"iPhone 15" \
                  --variable UDID:$UDID \
                  --variable IOS_APP_BUNDLE_ID:${IOS_BUNDLE_ID} \
                  --variable ENABLE_VIDEO_RECORDING:True \
                  test-cases/signup || true
          else
            echo "Signup test suite directory not found, skipping..."
          fi

      - name: Generate Combined Robot Framework Report
        if: always()
        run: |
          files=()
          for f in results/output.xml results/p0/output.xml results/login/output.xml results/signup/output.xml; do
            [ -f "$f" ] && files+=("$f")
          done
          
          if [ ${#files[@]} -gt 0 ]; then
            rebot --outputdir results/combined \
                  --name "Complete Test Execution Report" \
                  --output output.xml \
                  --log log.html \
                  --report report.html \
                  "${files[@]}"
            echo "Combined report generated from ${#files[@]} output file(s)"
          else
            echo "No Robot output.xml files found; skipping rebot."
          fi

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-robot-framework-test-results
          path: results/
          if-no-files-found: warn
          retention-days: 30

      - name: Upload Appium Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ios-appium-logs
          path: |
            appium-server.log
            appium-stdout.log
          if-no-files-found: warn
          retention-days: 7

      - name: Publish Test Results Summary
        if: always()
        run: |
          echo "## iOS Test Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f results/combined/report.html ]; then
            echo "Test execution completed. Download artifacts to view detailed reports." >> $GITHUB_STEP_SUMMARY
          else
            echo "Test execution failed or incomplete." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Shutdown Simulator
        if: always()
        run: |
          xcrun simctl shutdown "$UDID" || true
          echo "Simulator shut down"

      - name: Cleanup
        if: always()
        run: |
          # Stop Appium server
          if [ -f appium.pid ]; then
            kill $(cat appium.pid) || true
          fi
          
          echo "Cleanup completed"
