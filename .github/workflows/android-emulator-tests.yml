name: Android Emulator Robot Framework Tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  android-emulator-tests:
    timeout-minutes: 45
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Setup Node.js for Appium
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          echo "Python dependencies installed successfully"

      - name: Install Appium 2.0
        run: |
          npm install -g appium@next
          appium --version
          echo "Appium installed successfully"

      - name: Install Appium Drivers
        run: |
          appium driver install uiautomator2
          appium driver list --installed
          echo "Appium UIAutomator2 driver installed"

      - name: Download Test APK
        run: |
          mkdir -p apps
          curl -L -o apps/webdriverio-app.apk \
            https://raw.githubusercontent.com/inasribrahim/webIo_apk/main/webdriverio-app.apk
          ls -lh apps/
          echo "Test APK downloaded successfully"

      - name: Enable KVM (Kernel Virtual Machine)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          echo "KVM enabled for hardware acceleration"

      - name: Start Appium Server
        run: |
          nohup appium --log-level info --log appium-server.log &
          echo $! > appium.pid
          sleep 10
          echo "Appium server started"

      - name: Verify Appium Server is Running
        run: |
          curl -s http://localhost:4723/status || (cat appium-server.log && exit 1)
          echo "Appium server is running and responding"

      - name: Run Tests on Android Emulator
        uses: reactivecircus/android-emulator-runner@v2.32.0
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          profile: Nexus 6
          force-avd-creation: false
          disable-animations: true
          disable-spellchecker: true
          cores: 2
          ram-size: 4096M
          heap-size: 512M
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          script: |
            echo "Emulator started successfully"
            adb devices
            
            # Wait for system to be ready
            adb wait-for-device
            sleep 5
            
            # Unlock screen
            adb shell input keyevent 82
            adb shell input keyevent 4
            sleep 2
            
            # Install APK
            adb install -r apps/webdriverio-app.apk
            adb shell pm list packages | grep wdiodemoapp
            echo "APK installed successfully"
            
            # Run Robot Framework Tests - Smoke Suite
            robot --outputdir results \
                  --loglevel INFO \
                  --include Smoke \
                  --name "Smoke Test Suite" \
                  --variable PLATFORM_NAME:android \
                  --variable ANDROID_PLATFORM_VERSION:13 \
                  test-cases/ || true
            
            # Run Robot Framework Tests - P0 Critical Tests
            robot --outputdir results/p0 \
                  --loglevel INFO \
                  --include P0 \
                  --name "P0 Critical Tests" \
                  --variable PLATFORM_NAME:android \
                  --variable ANDROID_PLATFORM_VERSION:13 \
                  test-cases/ || true
            
            # Run Robot Framework Tests - Login Regression
            robot --outputdir results/login \
                  --loglevel INFO \
                  --include Module:LoginANDRegression \
                  --name "Login Regression Suite" \
                  --variable PLATFORM_NAME:android \
                  --variable ANDROID_PLATFORM_VERSION:13 \
                  test-cases/login/ || true
            
            # Run Robot Framework Tests - Signup Regression
            robot --outputdir results/signup \
                  --loglevel INFO \
                  --include Module:SignupANDRegression \
                  --name "Signup Regression Suite" \
                  --variable PLATFORM_NAME:android \
                  --variable ANDROID_PLATFORM_VERSION:13 \
                  test-cases/signup/ || true

      - name: Generate Combined Robot Framework Report
        if: always()
        run: |
          rebot --outputdir results/combined \
                --name "Complete Test Execution Report" \
                --output output.xml \
                --log log.html \
                --report report.html \
                results/output.xml \
                results/p0/output.xml \
                results/login/output.xml \
                results/signup/output.xml || true

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: robot-framework-test-results
          path: results/
          if-no-files-found: warn
          retention-days: 30

      - name: Upload Appium Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-logs
          path: appium-server.log
          if-no-files-found: warn
          retention-days: 7

      - name: Publish Test Results Summary
        if: always()
        run: |
          echo "## Test Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f results/combined/report.html ]; then
            echo "Test execution completed. Download artifacts to view detailed reports." >> $GITHUB_STEP_SUMMARY
          else
            echo "Test execution failed or incomplete." >> $GITHUB_STEP_SUMMARY
          fi

      - name: Cleanup
        if: always()
        run: |
          # Stop Appium server
          if [ -f appium.pid ]; then
            kill $(cat appium.pid) || true
          fi
          
          echo "Cleanup completed"
