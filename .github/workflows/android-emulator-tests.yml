name: Android Emulator Robot Framework Tests

# Trigger configuration:
# - Manual trigger only (workflow_dispatch) - run via GitHub Actions UI
# - Automatic triggers (push/pull_request) are disabled for resource optimization
# - To re-enable automatic triggers, uncomment the push and pull_request sections below
on:
  # push:
  #   branches: [main, master]
  # pull_request:
  #   branches: [main, master]
  workflow_dispatch:  # Manual trigger via GitHub Actions UI

jobs:
  android-emulator-tests:
    timeout-minutes: 45
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Setup Node.js for Appium
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          echo "Python dependencies installed successfully"

      - name: Install Appium 2.0
        run: |
          npm install -g appium@next
          appium --version
          echo "Appium installed successfully"

      - name: Install Appium Drivers
        run: |
          appium driver install uiautomator2
          appium driver list --installed
          echo "Appium UIAutomator2 driver installed"

      - name: Verify Test APK
        run: |
          ls -lh apps/wdioNativeDemoApp.apk
          
          # Verify it's a valid APK (zip archive)
          file apps/wdioNativeDemoApp.apk | tee /tmp/apk_filetype.txt
          unzip -t apps/wdioNativeDemoApp.apk >/dev/null
          
          echo "Test APK verified successfully"

      - name: Enable KVM (Kernel Virtual Machine)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          echo "KVM enabled for hardware acceleration"

      - name: Start Appium Server
        run: |
          nohup appium --log-level info --log appium-server.log &
          echo $! > appium.pid
          sleep 10
          echo "Appium server started"

      - name: Verify Appium Server is Running
        run: |
          curl -s http://localhost:4723/status || (cat appium-server.log && exit 1)
          echo "Appium server is running and responding"

      - name: Ensure Android AVD directories exist
        run: |
          mkdir -p "$HOME/.android/avd"
          mkdir -p "$HOME/.android"
          ls -la "$HOME/.android" || true
          echo "Android AVD directories prepared"

      - name: Run Tests on Android Emulator
        uses: reactivecircus/android-emulator-runner@v2.32.0
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          profile: Nexus 6
          force-avd-creation: true
          disable-animations: true
          disable-spellchecker: true
          cores: 2
          ram-size: 4096M
          heap-size: 512M
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          script: |
            set -eu

            echo "Emulator started successfully"
            adb devices

            # Stabilize ADB
            adb kill-server || true
            adb start-server
            adb wait-for-device

            # Wait for full boot + package manager readiness
            adb shell getprop sys.boot_completed | grep -m 1 "1"
            adb shell getprop dev.bootcomplete | grep -m 1 "1" || true

            # Disable animations for stability
            adb shell settings put global window_animation_scale 0 || true
            adb shell settings put global transition_animation_scale 0 || true
            adb shell settings put global animator_duration_scale 0 || true

            # Unlock screen
            adb shell input keyevent 82 || true
            adb shell input keyevent 4 || true
            sleep 2

            # Install APK with retries
            echo "Installing APK..."
            adb install -r apps/wdioNativeDemoApp.apk || { echo "First attempt failed, retrying..."; adb shell pm clear com.android.packageinstaller || true; sleep 3; adb install -r apps/wdioNativeDemoApp.apk; } || { echo "Second attempt failed, retrying..."; adb shell pm clear com.android.packageinstaller || true; sleep 3; adb install -r apps/wdioNativeDemoApp.apk; } || { echo "Third attempt failed"; exit 1; }
            echo "APK installed successfully"

            # Verify installation
            adb shell pm list packages | grep wdiodemoapp || echo "Warning: Package not found in pm list"
            echo "APK installation complete"

            # Common Robot Framework arguments
            ROBOT_COMMON_ARGS="--loglevel INFO --variable PLATFORM_NAME:android --variable ANDROID_PLATFORM_VERSION:13 --variable ENABLE_VIDEO_RECORDING:True"

            # Run Robot Framework Tests - Smoke Suite
            robot --outputdir results $ROBOT_COMMON_ARGS --include Smoke --name "Smoke Test Suite" test-cases || true

            # Run Robot Framework Tests - P0 Critical Tests
            robot --outputdir results/p0 $ROBOT_COMMON_ARGS --include P0 --name "P0 Critical Tests" test-cases || true

            # Run Robot Framework Tests - Login Regression
            if [ -d test-cases/login ]; then
              robot --outputdir results/login $ROBOT_COMMON_ARGS --name "Login Regression Suite" test-cases/login || true
            else
              echo "Login test suite directory not found, skipping..."
            fi

            # Run Robot Framework Tests - Signup Regression
            if [ -d test-cases/signup ]; then
              robot --outputdir results/signup $ROBOT_COMMON_ARGS --name "Signup Regression Suite" test-cases/signup || true
            else
              echo "Signup test suite directory not found, skipping..."
            fi

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-robot-framework-test-results
          path: results/
          if-no-files-found: warn
          retention-days: 30

      - name: Upload Appium Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-appium-logs
          path: appium-server.log
          if-no-files-found: warn
          retention-days: 7

      - name: Publish Test Results Summary
        if: always()
        run: |
          echo "## Android Test Execution Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Test execution completed. Download artifacts to view detailed reports." >> $GITHUB_STEP_SUMMARY

      - name: Shutdown Emulator
        if: always()
        run: |
          adb devices | grep emulator | cut -f1 | while read line; do adb -s $line emu kill; done || true
          echo "Android emulator shut down"

      - name: Cleanup
        if: always()
        run: |
          # Stop Appium server
          if [ -f appium.pid ]; then
            kill $(cat appium.pid) || true
          fi
          
          echo "Cleanup completed"
